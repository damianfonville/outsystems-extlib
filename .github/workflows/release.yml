name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
      - "[0-9]*.[0-9]*.[0-9]*"

jobs:
  package-and-publish-lib:
    runs-on: windows-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Compute package version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"

          if ($tag -notmatch '^v?\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Tag '$tag' is not a supported version tag. Use 1.2.3, v1.2.3, or 1.2.3-preview.1."
          }

          $version = $tag -replace '^v', ''
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Create the package
        run: dotnet pack --configuration Release OutSystems.ExternalLibrary.Template.csproj -p:Version=${{ steps.version.outputs.version }} --output ./artifacts 

      - name: Smoke test dotnet template
        shell: pwsh
        run: .\build\Invoke-DotNetTemplateSmokeTest.ps1
        
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*.nupkg

      - name: Publish NuGet package
        run: |
          $package = Get-ChildItem -Path artifacts -Filter *.nupkg -File | Select-Object -First 1

          if (-not $package) {
            throw "No .nupkg file found in artifacts."
          }

          dotnet nuget push $package.FullName --api-key ${{ secrets.PUSH_NUGET }} --source https://api.nuget.org/v3/index.json --skip-duplicate
